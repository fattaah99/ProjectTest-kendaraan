<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Tambah Data Kendaraan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container py-4">
        <!-- Page Header -->
        <div class="page-header d-flex align-items-center gap-2">
            <i class="fa-solid fa-folder fa-xl" style="color:#3e8bff;"></i>
            <h3 id="headerTitle">Tambah Data Kendaraan</h3>
        </div>

        <!-- Form Card -->
        <div class="card form-card">
            <div class="form-title" id="formTitle">Tambah Data Kendaraan</div>

            <form id="formTambah" onsubmit="simpanData(event)">
                <div class="row">
                    <!-- Kolom Kiri -->
                    <div class="col-md-6">
                        <div class="mb-form">
                            <label for="nomorRegistrasi" class="form-label">No. Registrasi Kendaraan</label>
                            <input type="text" id="nomorRegistrasi" name="nomorRegistrasi" class="form-control"
                                required>
                        </div>
                        <div class="mb-form">
                            <label for="namaPemilik" class="form-label">Nama Pemilik</label>
                            <input type="text" id="namaPemilik" name="namaPemilik" class="form-control" required>
                        </div>
                        <div class="mb-form">
                            <label for="merkKendaraan" class="form-label">Merk Kendaraan</label>
                            <input type="text" id="merkKendaraan" name="merkKendaraan" class="form-control" required>
                        </div>
                        <div class="mb-form">
                            <label for="alamat" class="form-label">Alamat Pemilik Kendaraan</label>
                            <textarea id="alamat" name="alamat" class="form-control" rows="3"></textarea>
                        </div>
                    </div>

                    <!-- Kolom Kanan -->
                    <div class="col-md-6">
                        <div class="mb-form">
                            <label for="tahunPembuatan" class="form-label">Tahun Pembuatan</label>
                            <input type="number" id="tahunPembuatan" name="tahunPembuatan" class="form-control"
                                min="1900" max="2099" required>
                        </div>
                        <div class="mb-form">
                            <label for="kapasitasSilinder" class="form-label">Kapasitas Silinder</label>
                            <input type="number" id="kapasitasSilinder" name="kapasitasSilinder" class="form-control"
                                required>
                        </div>
                        <div class="mb-form">
                            <label for="warnaKendaraan" class="form-label">Warna Kendaraan</label>
                            <select id="warnaKendaraan" name="warnaKendaraan" class="form-select" required>
                                <option value="" disabled selected>Pilih Warna</option>
                                <option value="Hitam">Hitam</option>
                                <option value="Putih">Putih</option>
                                <option value="Merah">Merah</option>
                                <option value="Biru">Biru</option>
                                <option value="Silver">Silver</option>
                                <option value="Abu-abu">Abu-abu</option>
                                <option value="Kuning">Kuning</option>
                                <option value="Hijau">Hijau</option>
                                <option value="Orange">Orange</option>
                                <option value="Coklat">Coklat</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div class="mb-form">
                            <label for="bahanBakar" class="form-label">Bahan Bakar</label>
                            <input type="text" id="bahanBakar" name="bahanBakar" class="form-control" required>
                        </div>
                    </div>
                </div>

                <!-- Tombol Aksi -->
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-simpan">Simpan</button>
                    <button type="button" class="btn btn-kembali" onclick="kembali()">Kembali</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_URL = 'http://localhost:8080/api/kendaraan';

        // ── Baca query param ──────────────────────────────
        const params  = new URLSearchParams(window.location.search);
        const isEdit  = params.get('mode') === 'edit';
        const editId  = params.get('id') ?? '';

        // ── Inisialisasi halaman ──────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            if (isEdit) {
                // Ubah judul & title
                const label = 'Edit Data Kendaraan';
                document.getElementById('pageTitle').textContent  = label;
                document.getElementById('headerTitle').textContent = label;
                document.getElementById('formTitle').textContent  = label;

                // Field No. Registrasi tidak bisa diubah saat edit
                const inputReg = document.getElementById('nomorRegistrasi');
                inputReg.readOnly = true;
                inputReg.classList.add('bg-light');

                // Ambil data dari API lalu isi form
                try {
                    const res  = await fetch(`${API_URL}/${encodeURIComponent(editId)}`);
                    if (!res.ok) throw new Error('Data tidak ditemukan');
                    const json = await res.json();
                    const d    = json.data ?? json;  // unwrap ApiResponse
                    isiForm(d);
                } catch (err) {
                    alert('Gagal memuat data: ' + err.message);
                    window.location.href = 'index.html';
                }
            }
        });

        // ── Isi form dengan data ──────────────────────────
        function isiForm(d) {
            document.getElementById('nomorRegistrasi').value  = d.nomorRegistrasi  ?? '';
            document.getElementById('namaPemilik').value      = d.namaPemilik      ?? '';
            document.getElementById('merkKendaraan').value    = d.merkKendaraan    ?? '';
            document.getElementById('alamat').value         = d.alamat          ?? '';
            document.getElementById('tahunPembuatan').value   = d.tahunPembuatan   ?? '';
            document.getElementById('kapasitasSilinder').value = d.kapasitasSilinder ?? '';
            document.getElementById('warnaKendaraan').value   = d.warnaKendaraan   ?? '';
            document.getElementById('bahanBakar').value       = d.bahanBakar       ?? '';
        }

        // ── Submit form (Tambah = POST, Edit = PUT) ───────
        async function simpanData(e) {
            e.preventDefault();

            const payload = {
                nomorRegistrasi:  document.getElementById('nomorRegistrasi').value.trim(),
                namaPemilik:      document.getElementById('namaPemilik').value.trim(),
                merkKendaraan:    document.getElementById('merkKendaraan').value.trim(),
                alamat:           document.getElementById('alamat').value.trim(),
                tahunPembuatan:   parseInt(document.getElementById('tahunPembuatan').value),
                kapasitasSilinder: parseInt(document.getElementById('kapasitasSilinder').value),
                warnaKendaraan:   document.getElementById('warnaKendaraan').value,
                bahanBakar:       document.getElementById('bahanBakar').value.trim(),
            };

            const url    = isEdit ? `${API_URL}/${encodeURIComponent(editId)}` : API_URL;
            const method = isEdit ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(errText || 'Gagal menyimpan data');
                }

                alert(isEdit ? 'Data berhasil diperbarui!' : 'Data berhasil disimpan!');
                window.location.href = 'index.html';
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        function kembali() {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
