<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Data Kendaraan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="page-header d-flex align-items-center gap-2">
            <i class="fa-solid fa-folder fa-xl" style="color:#3e8bff;"></i>
            <h3>Aplikasi Data Kendaraan</h3>
        </div>
        <div class="card search-card">
            <div class="mb-3">
                <label for="noRegistrasi">No Registrasi</label>
                <input type="text" id="noRegistrasi" class="form-control" placeholder="">
            </div>
            <div class="mb-3">
                <label for="namaPemilik">Nama Pemilik</label>
                <input type="text" id="namaPemilik" class="form-control" placeholder="">
            </div>
        </div>
        <div class="action-row">
            <button class="btn btn-search btn-primary" onclick="searchData()">
                <i class="fa-solid fa-magnifying-glass me-1"></i> Search
            </button>
            <button class="btn btn-add btn-primary" onclick="window.location.href='form.html'">
                <i class="fa-solid fa-plus me-1"></i> Add
            </button>
        </div>

        <div class="table-wrapper">
            <table class="table table-bordered mb-0" id="tabelKendaraan">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>No Registrasi</th>
                        <th>Nama Pemilik</th>
                        <th>Merk Kendaraan</th>
                        <th>Tahun Pembuatan</th>
                        <th>Kapasitas</th>
                        <th>Warna</th>
                        <th>Bahan Bakar</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tabelBody">
                    <!-- Diisi oleh JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Konfirmasi Hapus -->
    <div class="modal fade" id="modalHapus" tabindex="-1" aria-labelledby="modalHapusLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 360px;">
            <div class="modal-content" style="border-radius: 4px;">
                <div class="modal-body py-4 px-4">
                    <p id="modalHapusMsg" class="mb-0" style="font-size:0.9rem;">Anda yakin menghapus data ini?</p>
                </div>
                <div class="modal-footer border-0 pt-0 pb-3 px-4 gap-2 justify-content-end">
                    <button id="btnOkHapus" type="button" class="btn btn-simpan">OK</button>
                    <button type="button" class="btn btn-kembali" data-bs-dismiss="modal">Batal</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_URL = 'http://localhost:8080/api/kendaraan';

        // Cache semua data yang sudah diload
        let allData = [];

        // ── Render tabel ──────────────────────────────────
        function renderTabel(data) {
            const tbody = document.getElementById('tabelBody');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-3">Data tidak ditemukan</td></tr>';
                return;
            }

            data.forEach((d, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${d.nomorRegistrasi ?? '-'}</td>
                    <td>${d.namaPemilik ?? '-'}</td>
                    <td>${d.merkKendaraan ?? '-'}</td>
                    <td>${d.tahunPembuatan ?? '-'}</td>
                    <td>${d.kapasitasSilinder ?? '-'}</td>
                    <td>${d.warnaKendaraan ?? '-'}</td>
                    <td>${d.bahanBakar ?? '-'}</td>
                    <td>
                        <a href="#" class="link-detail me-1">Detail</a>
                        <a href="form.html?mode=edit&id=${encodeURIComponent(d.nomorRegistrasi)}" class="link-edit me-1">Edit</a>
                        <a href="#" class="link-delete" onclick="hapusData('${d.nomorRegistrasi}');return false;">Delete</a>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        // ── Load semua data dari API ───────────────────────
        async function loadData() {
            document.getElementById('tabelBody').innerHTML =
                '<tr><td colspan="9" class="text-center py-3"><span class="spinner-border spinner-border-sm me-2"></span>Memuat data...</td></tr>';
            try {
                const res  = await fetch(API_URL);
                const json = await res.json();
                allData = Array.isArray(json) ? json : (json.data ?? []);
                renderTabel(allData);
            } catch (err) {
                document.getElementById('tabelBody').innerHTML =
                    `<tr><td colspan="9" class="text-center text-danger py-3">Gagal memuat data: ${err.message}</td></tr>`;
                console.error('API Error:', err);
            }
        }

        // ── Search ke backend ─────────────────────────────
        async function searchData() {
            const noReg   = document.getElementById('noRegistrasi').value.trim();
            const namaPem = document.getElementById('namaPemilik').value.trim();

            // Kalau kosong semua, tampilkan semua data
            if (!noReg && !namaPem) {
                renderTabel(allData);
                return;
            }

            const params = new URLSearchParams();
            if (noReg)   params.append('nomorRegistrasi', noReg);
            if (namaPem) params.append('namaPemilik', namaPem);

            document.getElementById('tabelBody').innerHTML =
                '<tr><td colspan="9" class="text-center py-3"><span class="spinner-border spinner-border-sm me-2"></span>Mencari data...</td></tr>';

            try {
                const res  = await fetch(`${API_URL}/search?${params}`);
                const json = await res.json();
                const list = Array.isArray(json) ? json : (json.data ?? []);
                renderTabel(list);
            } catch (err) {
                document.getElementById('tabelBody').innerHTML =
                    `<tr><td colspan="9" class="text-center text-danger py-3">Gagal mencari data: ${err.message}</td></tr>`;
            }
        }

        // ── Delete ────────────────────────────────────────
        let _hapusId = '';

        function hapusData(id) {
            _hapusId = id;
            document.getElementById('modalHapusMsg').textContent =
                `Anda yakin menghapus data ${id} ?`;
            new bootstrap.Modal(document.getElementById('modalHapus')).show();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btnOkHapus').addEventListener('click', async () => {
                const modal = bootstrap.Modal.getInstance(document.getElementById('modalHapus'));
                modal.hide();
                try {
                    const res = await fetch(`${API_URL}/${_hapusId}`, { method: 'DELETE' });
                    if (!res.ok) throw new Error('Gagal menghapus');
                    alert('Data berhasil dihapus.');
                    loadData();
                } catch (err) {
                    alert('Gagal menghapus data: ' + err.message);
                }
            });
        });

        // ── Init ──────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>

</html>
